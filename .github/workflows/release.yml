name: Release on Tag

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: read

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runs_on: ubuntu-24.04
            triplet: x64-linux
            asset_name: Hakihive-linux-x64
            exe_name: Hakihive

          - name: linux-arm64
            runs_on: ubuntu-24.04-arm
            triplet: arm64-linux
            asset_name: Hakihive-linux-arm64
            exe_name: Hakihive

          - name: windows-x64
            runs_on: windows-2025
            triplet: x64-windows-static
            asset_name: Hakihive-windows-x64.exe
            exe_name: Hakihive.exe

          - name: windows-arm64
            runs_on: windows-11-arm
            triplet: arm64-windows-static
            asset_name: Hakihive-windows-arm64.exe
            exe_name: Hakihive.exe

          - name: macos-arm64
            runs_on: macos-latest
            triplet: arm64-osx
            asset_name: Hakihive-macos-arm64
            exe_name: Hakihive

          - name: macos-intel
            runs_on: macos-15-intel
            triplet: x64-osx
            asset_name: Hakihive-macos-intel
            exe_name: Hakihive

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Bootstrap vcpkg (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$RUNNER_TEMP/vcpkg"
          "$RUNNER_TEMP/vcpkg/bootstrap-vcpkg.sh"

      - name: Bootstrap vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$env:RUNNER_TEMP/vcpkg"
          & "$env:RUNNER_TEMP/vcpkg/bootstrap-vcpkg.bat"

      - name: Install dependencies (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          "$RUNNER_TEMP/vcpkg/vcpkg" install \
            curl:${{ matrix.triplet }} \
            nlohmann-json:${{ matrix.triplet }} \
            openssl:${{ matrix.triplet }} \
            libarchive:${{ matrix.triplet }} \
            ftxui:${{ matrix.triplet }}

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & "$env:RUNNER_TEMP/vcpkg/vcpkg.exe" install `
            curl:${{ matrix.triplet }} `
            nlohmann-json:${{ matrix.triplet }} `
            openssl:${{ matrix.triplet }} `
            libarchive:${{ matrix.triplet }} `
            ftxui:${{ matrix.triplet }}

      - name: Configure CMake (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$RUNNER_TEMP/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET="${{ matrix.triplet }}"

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -S . -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:RUNNER_TEMP/vcpkg/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET="${{ matrix.triplet }}"

      - name: Build target Hakihive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cmake --build build --config Release --target Hakihive -- -j 3

      - name: Build target Hakihive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake --build build --config Release --target Hakihive -- /m:3

      - name: Collect final binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p release-files
          if [ -f "build/Hakihive" ]; then
            cp "build/Hakihive" "release-files/${{ matrix.asset_name }}"
          elif [ -f "build/Release/Hakihive" ]; then
            cp "build/Release/Hakihive" "release-files/${{ matrix.asset_name }}"
          else
            echo "Hakihive binary not found"
            find build -maxdepth 4 -type f | sort
            exit 1
          fi
          chmod +x "release-files/${{ matrix.asset_name }}"

      - name: Collect final binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-files | Out-Null
          if (Test-Path "build/Release/Hakihive.exe") {
            Copy-Item "build/Release/Hakihive.exe" "release-files/${{ matrix.asset_name }}"
          } elseif (Test-Path "build/Hakihive.exe") {
            Copy-Item "build/Hakihive.exe" "release-files/${{ matrix.asset_name }}"
          } else {
            Write-Host "Hakihive.exe not found"
            Get-ChildItem -Recurse build | Select-Object FullName
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: release-files/${{ matrix.asset_name }}

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-24.04
    if: github.ref_type == 'tag'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare release metadata
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          echo "TAG_NAME=${TAG_NAME}" >> "$GITHUB_ENV"

          if [[ "$TAG_NAME" == *alpha* || "$TAG_NAME" == *beta* ]]; then
            echo "PRERELEASE=true" >> "$GITHUB_ENV"
          else
            echo "PRERELEASE=false" >> "$GITHUB_ENV"
          fi

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Show downloaded artifacts
        shell: bash
        run: |
          find release-assets -type f | sort

      - name: Build release notes from commits
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ env.TAG_NAME }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            const tagName = process.env.TAG_NAME || process.env.GITHUB_REF_NAME;
            const sha = process.env.GITHUB_SHA;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            function run(cmd) {
              return execSync(cmd, { encoding: 'utf8' }).trim();
            }

            let prevTag = '';
            let revRange = sha;

            try {
              prevTag = run(`git describe --tags --abbrev=0 "${sha}^"`);
              revRange = `${prevTag}..${sha}`;
            } catch (e) {
              prevTag = '';
              revRange = sha;
            }

            let raw = '';
            try {
              raw = run(`git log ${revRange} --no-merges --pretty=format:%H%x1f%an%x1f%s%x1f%b%x1e`);
            } catch (e) {
              raw = '';
            }

            const records = raw
              .split('\x1e')
              .map(x => x.trim())
              .filter(Boolean)
              .map(r => {
                const parts = r.split('\x1f');
                return {
                  commitSha: parts[0] || '',
                  authorName: parts[1] || '',
                  subject: (parts[2] || '').trim(),
                  body: (parts[3] || '').replace(/\s+$/, ''),
                };
              });

            const headerRe = /^(?<type>[A-Za-z][A-Za-z0-9_-]*)(?:\([^)]+\))?(?:!)?:\s*(?<title>.+)$/;
            const groups = new Map();
            groups.set('other', []);

            function normalizeBody(body) {
              const lines = [];
              for (const rawLine of body.split('\n')) {
                if (!rawLine.trim()) continue;
                const line = rawLine.replace(/\t/g, '    ');
                const stripped = line.trim();

                if (/^[-*]\s+/.test(stripped)) {
                  lines.push(`    ${stripped}`);
                } else {
                  lines.push(`    - ${stripped}`);
                }
              }
              return lines;
            }

            async function getPrInfo(commitSha) {
              try {
                const res = await github.request(
                  'GET /repos/{owner}/{repo}/commits/{commit_sha}/pulls',
                  {
                    owner,
                    repo,
                    commit_sha: commitSha,
                    mediaType: { previews: ['groot'] }
                  }
                );

                const prs = res.data || [];
                if (!prs.length) return null;

                const pr = prs.find(p => p.merged_at) || prs[0];
                return {
                  number: pr.number,
                  url: pr.html_url,
                  authorLogin: pr.user?.login || null,
                  authorUrl: pr.user?.html_url || null,
                };
              } catch (e) {
                return null;
              }
            }

            for (const rec of records) {
              const m = rec.subject.match(headerRe);

              let kind = 'other';
              let title = rec.subject;

              if (m?.groups?.type && m?.groups?.title) {
                kind = m.groups.type.toLowerCase();
                title = m.groups.title.trim();
              }

              if (!groups.has(kind) && kind !== 'other') {
                groups.set(kind, []);
              }

              const prInfo = await getPrInfo(rec.commitSha);

              let suffix = '';
              if (prInfo) {
                suffix = `([#${prInfo.number}](${prInfo.url}))`;
              } else {
                suffix = `(\`${rec.commitSha.slice(0, 7)}\`)`;
              }

              let byLine = '';
              if (prInfo?.authorLogin && prInfo?.authorUrl) {
                byLine = `  \n  By [@${prInfo.authorLogin}](${prInfo.authorUrl})`;
              } else if (rec.authorName) {
                byLine = `  \n  By ${rec.authorName}`;
              }

              const itemLines = [
                `- ${title} ${suffix}${byLine}`,
                ...normalizeBody(rec.body),
              ];

              groups.get(kind).push(itemLines.join('\n'));
            }

            const orderedKeys = [...groups.keys()].filter(k => k !== 'other');
            if ((groups.get('other') || []).length) {
              orderedKeys.push('other');
            }

            const output = [];
            output.push(`# Release ${tagName}`);
            output.push('');

            if (prevTag) {
              output.push(`Range: \`${prevTag}...${tagName}\``);
            } else {
              output.push(`Range: initial release ... \`${tagName}\``);
            }
            output.push('');

            for (const key of orderedKeys) {
              const items = groups.get(key) || [];
              if (!items.length) continue;

              output.push(`## ${key}:`);
              output.push('');
              output.push(items.join('\n\n'));
              output.push('');
              output.push('---');
              output.push('');
            }

            while (output.length && output[output.length - 1] === '') {
              output.pop();
            }
            if (output.length && output[output.length - 1] === '---') {
              output.pop();
            }

            const notes = output.join('\n') + '\n';
            fs.writeFileSync('RELEASE_NOTES.md', notes, 'utf8');
            console.log(notes);

      - name: Create GitHub Release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          name: Hakihive ${{ env.TAG_NAME }}
          tag_name: ${{ env.TAG_NAME }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ env.PRERELEASE == 'true' }}
          generate_release_notes: false
          files: |
            release-assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
