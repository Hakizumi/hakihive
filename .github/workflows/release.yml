name: Release on Tag

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Compile TypeScript
        run: npx --yes --package typescript tsc

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Prepare release jar name
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          cp target/hakihive.jar "target/hakihive-${TAG_NAME}.jar"
          echo "TAG_NAME=${TAG_NAME}" >> "$GITHUB_ENV"

      - name: Prepare release description
        run: |
          COMMIT_MSG="$(git log -1 --pretty=%B)"
          {
            echo 'RELEASE_BODY<<EOF'
            echo "## ${COMMIT_MSG}"
            echo 'EOF'
          } >> "$GITHUB_ENV"

      - name: Debug build outputs
        run: |
          ls -lah target || true
          echo "Release tag: $TAG_NAME"

      - name: Create GitHub Release and upload assets
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: Hakihive ${{ env.TAG_NAME }}
          tag_name: ${{ env.TAG_NAME }}
          body: ${{ env.RELEASE_BODY }}
          files: |
            target/hakihive-${{ env.TAG_NAME }}.jar

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
