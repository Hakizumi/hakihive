name: Release on Tag

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: read

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Compile TypeScript
        run: npx --yes --package typescript tsc

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Prepare release metadata
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"

          cp target/hakihive.jar "target/hakihive-${TAG_NAME}.jar"

          if [[ "$TAG_NAME" == *alpha* || "$TAG_NAME" == *beta* ]]; then
            echo "PRERELEASE=true" >> "$GITHUB_ENV"
          else
            echo "PRERELEASE=false" >> "$GITHUB_ENV"
          fi

          echo "TAG_NAME=${TAG_NAME}" >> "$GITHUB_ENV"

      - name: Debug build outputs
        run: |
          ls -lah target || true
          echo "Release tag: $TAG_NAME"
          echo "Prerelease: $PRERELEASE"

      - name: Build release notes from commits
        uses: actions/github-script@v8
        env:
          TAG_NAME: ${{ env.TAG_NAME }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            const tagName = process.env.TAG_NAME || process.env.GITHUB_REF_NAME;
            const sha = process.env.GITHUB_SHA;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            function run(cmd) {
              return execSync(cmd, { encoding: 'utf8' }).trim();
            }

            let prevTag = '';
            let revRange = sha;

            try {
              prevTag = run(`git describe --tags --abbrev=0 "${sha}^"`);
              revRange = `${prevTag}..${sha}`;
            } catch (e) {
              prevTag = '';
              revRange = sha;
            }

            const raw = run(
              `git log ${revRange} --no-merges --pretty=format:%H%x1f%an%x1f%s%x1f%b%x1e`
            );

            const records = raw
              .split('\x1e')
              .map(x => x.trim())
              .filter(Boolean)
              .map(r => {
                const parts = r.split('\x1f');
                return {
                  commitSha: parts[0] || '',
                  authorName: parts[1] || '',
                  subject: (parts[2] || '').trim(),
                  body: (parts[3] || '').replace(/\s+$/, ''),
                };
              });

            const headerRe = /^(?<type>[A-Za-z][A-Za-z0-9_-]*)(?:\([^)]+\))?(?:!)?:\s*(?<title>.+)$/;
            const groups = new Map();
            groups.set('other', []);

            function normalizeBody(body) {
              const lines = [];
              for (const rawLine of body.split('\n')) {
                if (!rawLine.trim()) continue;

                const line = rawLine.replace(/\t/g, '    ');
                const stripped = line.trim();

                if (/^[-*]\s+/.test(stripped)) {
                  lines.push(`    ${stripped}`);
                } else {
                  lines.push(`    - ${stripped}`);
                }
              }
              return lines;
            }

            async function getPrInfo(commitSha) {
              try {
                const res = await github.request(
                  'GET /repos/{owner}/{repo}/commits/{commit_sha}/pulls',
                  {
                    owner,
                    repo,
                    commit_sha: commitSha,
                    mediaType: {
                      previews: ['groot']
                    }
                  }
                );

                const prs = res.data || [];
                if (!prs.length) return null;

                const pr = prs.find(p => p.merged_at) || prs[0];

                return {
                  number: pr.number,
                  url: pr.html_url,
                  authorLogin: pr.user?.login || null,
                  authorUrl: pr.user?.html_url || null,
                };
              } catch (e) {
                return null;
              }
            }

            for (const rec of records) {
              const m = rec.subject.match(headerRe);

              let kind = 'other';
              let title = rec.subject;

              if (m?.groups?.type && m?.groups?.title) {
                kind = m.groups.type.toLowerCase();
                title = m.groups.title.trim();
              }

              if (!groups.has(kind) && kind !== 'other') {
                groups.set(kind, []);
              }

              const prInfo = await getPrInfo(rec.commitSha);

              let suffix = '';
              if (prInfo) {
                suffix = `([#${prInfo.number}](${prInfo.url}))`;
              } else {
                suffix = `(\`${rec.commitSha.slice(0, 7)}\`)`;
              }

              let byLine = '';
              if (prInfo?.authorLogin && prInfo?.authorUrl) {
                byLine = `  \n  By [@${prInfo.authorLogin}](${prInfo.authorUrl})`;
              } else if (rec.authorName) {
                byLine = `  \n  By ${rec.authorName}`;
              }

              const itemLines = [
                `- ${title} ${suffix}${byLine}`,
                ...normalizeBody(rec.body),
              ];

              groups.get(kind).push(itemLines.join('\n'));
            }

            const orderedKeys = [...groups.keys()].filter(k => k !== 'other');
            if ((groups.get('other') || []).length) {
              orderedKeys.push('other');
            }

            const output = [];
            output.push(`# Release ${tagName}`);
            output.push('');

            if (prevTag) {
              output.push(`Range: \`${prevTag}...${tagName}\``);
            } else {
              output.push(`Range: initial release ... \`${tagName}\``);
            }
            output.push('');

            for (const key of orderedKeys) {
              const items = groups.get(key) || [];
              if (!items.length) continue;

              output.push(`## ${key}:`);
              output.push('');
              output.push(items.join('\n\n'));
              output.push('');
              output.push('---');
              output.push('');
            }

            while (output.length && output[output.length - 1] === '') {
              output.pop();
            }
            if (output.length && output[output.length - 1] === '---') {
              output.pop();
            }

            const notes = output.join('\n') + '\n';
            fs.writeFileSync('RELEASE_NOTES.md', notes, 'utf8');
            console.log(notes);

      - name: Create GitHub Release and upload assets
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: Hakihive ${{ env.TAG_NAME }}
          tag_name: ${{ env.TAG_NAME }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ env.PRERELEASE == 'true' }}
          generate_release_notes: false
          files: |
            target/hakihive-${{ env.TAG_NAME }}.jar

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
