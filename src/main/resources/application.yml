server:
  port: 11622

spring:
  application:
    name: Hakihive

  ai:
    openai:
      api-key: sk-xxxx   # You configure
      base-url: https://api.openai.com

hakihive:
  models:
    # Models config properties,see org/hakizumi/hakihive/config/ModelProperties
    decision-model: gpt-4  # main reply model

    stt:
      # Local speech to text model ( sherpa ) properties
      # see org/hakizumi/hakihive/config/ModelProperties#Stt
      enable: true

      token-file-path: models/stt/tokens.txt
      encoder-file-path: models/stt/encoder-epoch-99-avg-1.int8.onnx
      decoder-file-path: models/stt/decoder-epoch-99-avg-1.int8.onnx
      joiner-file-path: models/stt/joiner-epoch-99-avg-1.int8.onnx

  audio:
    # Properties for speech to text models
    # see org/hakizumi/hakihive/config/AudioProperties

    asr-threads: 1
    vad-rms-threshold: 0.015
    silence-trigger-frame: 18
    speech-trigger-frame: 18

  tools:
    # config about ai-agent-tools
    system-tools:
      enable: true

    io-tools:
      enable: true
      # see org.hakizumi.hakihive.tools.IOTools
      whitelist:
        - E:/safe_path    # Safe path
      blacklist:
        # blacklist paths ( model cannot access )
        - /    # All

      # If the whitelist and blacklist have duplicated entries, an IllegalArgumentException will be called

logging:
  level:
    root: info
    org.hakizumi.hakihive: debug